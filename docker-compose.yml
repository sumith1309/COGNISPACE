# ═══════════════════════════════════════════════════════════════════════════════
# Cognispace Platform — Local Development Services
# Usage: pnpm db:up | pnpm db:down | pnpm db:reset
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # PostgreSQL 16 — Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: cognispace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cognispace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 — Cache, Sessions, Queues
  redis:
    image: redis:7-alpine
    container_name: cognispace-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog — Local Email Testing (SMTP on 1025, Web UI on 8025)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cognispace-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI for viewing emails
    logging:
      driver: none     # Suppress noisy logs

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
